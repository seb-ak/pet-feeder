<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="code/icon.png" type="image/png">
    <title>dashboard</title>

    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
            color: #bcbfc2ff;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: black;
        }

        #video {
            /* background-color: rgba(255, 255, 255, 0.144);
            border: white solid 1px;
            box-sizing: border-box; */

            position: fixed;
            top: 50%;
            left: 50%;
            
            aspect-ratio: 16 / 9;
            width: min(100vw, calc(100vh * 16/9));
            height: auto;
            max-width: none;
            max-height: none;

            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        #video img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feed-status {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: clamp(1rem, 2.2vw, 1.5rem);
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 2;
        }

        .feed-status.visible {
            opacity: 1;
        }

        @media (max-aspect-ratio: 1/1) {
            #video {
                width: auto;
                height: min(100vw, calc(100vh * 9/16));

                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center center;
            }
        }




        
        .side#list, .side#expand {
            position: relative;
            box-sizing: border-box;
            
            border: rgba(194, 224, 236, 0.5) solid 0.2rem;
            background-color: rgba(81, 85, 87, 0.6);
        }

        .side#expand {

            bottom: 0;

            width: 1.5rem;
            height: 2rem;

            opacity: 0.9;
            
            border-right: none;
            border-top-left-radius: 2rem;
            border-bottom-left-radius: 2rem;

            align-content: center;
            text-align: center;
        }

        .side#expand:hover {
            opacity: 1;
        }

        #spinner {
            font-weight: bolder;
            color: rgba(187, 209, 208, 0.5);

            transition-timing-function: linear(0, -0.001 4.9%, -0.007 8.3%, -0.02 11.4%, -0.04 14.3%, -0.07 17.2%, -0.11 20.2%, -0.158 23.1%, -0.267 29.2%, -0.309 32.1%, -0.325 33.7%, -0.333 35.2%, -0.332 36.5%, -0.324 37.8%, -0.311 38.8%, -0.293 39.7%, -0.27 40.6%, -0.241 41.5%, -0.164 43.2%, -0.065 44.8%, 0.057 46.3%, 0.198 47.7%, 0.358 49%, 0.719 51.6%, 0.856 52.8%, 0.97 54%, 1.086 55.5%, 1.18 57.1%, 1.248 58.7%, 1.276 59.6%, 1.298 60.5%, 1.319 61.8%, 1.327 62.5%, 1.331 63.2%, 1.333 63.9%, 1.333 64.6%, 1.331 65.4%, 1.326 66.2%, 1.308 68%, 1.278 70.1%, 1.154 77.1%, 1.107 80%, 1.075 82.4%, 1.048 84.8%, 1.035 86.3%, 1.024 87.9%, 1.015 89.5%, 1.009 91.2%, 1.002 94.8%, 1);
            transition-duration: 1s;
            transition-property: rotate;
            transition-behavior: inherit;

            rotate: 0deg;
        }

        .side#container {
            
            position: fixed;

            top: 5vh;
            left: calc(100vw - 1.5rem);

            height: 90vh;
            display: flex;

            transition-duration: 0.4s;
            /* transition-timing-function: linear(0, 0.162 5.1%, 0.329 11.1%, 0.845 31%, 0.934 34.7%, 1 37.8%, 0.945 40.9%, 0.924 42.4%, 0.906 43.9%, 0.892 45.4%, 0.883 46.8%, 0.877 48.2%, 0.875 49.7%, 0.876 51%, 0.88 52.3%, 0.888 53.7%, 0.898 55.1%, 0.918 57.4%, 0.978 63.1%, 1 65.5%, 0.986 67.4%, 0.976 69.2%, 0.971 71%, 0.969 72.9%, 0.97 74.5%, 0.974 76.3%, 0.994 82.2%, 1 84.5%, 0.996 86.8%, 0.995 89.2%, 1); */
            transition-timing-function: linear(0, 0.092 4.7%, 0.189 9.9%, 0.495 27.3%, 0.806 44.6%, 0.87 48.4%, 0.921 51.7%, 0.965 54.8%, 1 57.7%, 0.964 61.4%, 0.941 64.8%, 0.933 66.5%, 0.927 68.3%, 0.923 70%, 0.922 71.8%, 0.925 74.7%, 0.933 77.8%, 0.944 80.7%, 0.977 87.9%, 0.99 91.8%, 0.998 95.7%, 1);
            transition-property: left right;
        }


        

        .side#list {

            font-size: 10vh;

            display: flex;
            flex-direction: column;

            opacity: 0.9;

            width: calc(14rem);
            padding: 1rem;
            gap: 0.25rem;

            border-right: none;
            border-bottom-left-radius: 2rem;

        }

        .side#list form {
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .side#list button, .side#list input {
            color: white;
            background-color: transparent;
            width: 12rem;
            border: 0.2rem rgba(245, 245, 245, 0.6) solid;

            margin: 0;
            padding: 0.2rem;

            box-sizing: border-box;
        }

        .side#list button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .side#list input:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .side#list input:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border: 0.2rem rgba(245, 245, 245, 0.6) solid;
            outline: transparent;
        }

        .side#list button:first-child, .side#list input:first-child {
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }

        .side#list button:last-child, .side#list input:last-child {
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }

        .side#list hr {
            color: white;
            opacity: 0.6;
            width: 12rem;
            border: 0.15rem whitesmoke solid;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .side#list span {
            height: 2000vh;
        }

        .side#list p {
            font-size: 1rem;
        }




        @keyframes loadSpin {
            0% {transform: translate(-50%, -50%) rotate(0deg);}
            100% {transform: translate(-50%, -50%) rotate(-360deg);}
        }

        #loading {
            position: absolute;
            bottom: 5vmin;
            left: 15vmin;
            transform: translate(-50%, -50%);
            width: 10vmin;
            height: 10vmin;
            background-image: conic-gradient(rgba(177, 204, 204, 0.4), rgba(177, 204, 204, 0.1) 85%);
            border-radius: 50%;

            animation: loadSpin 1s linear infinite;
        }

    </style>

</head>
<body>


    <div id="loading"></div>


    <div class="side" id="container">

        <div class="side" id="expand" onclick="toggleSide()">
            <div id="spinner"><</div>
        </div>

        <div class="side" id="list">
            
            <form method="post" action="/login">
                <input type="password" name="pw" placeholder="Password"/>
                <hr>
                <button type="submit">Login</button>
            </form>

            <p>Enter password.</p>

        </div>

    </div>



<script>
    function toggleFullscreen() {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        else {
            document.body.requestFullscreen();
        }
    }

    let sideOpen = false;
    function toggleSide() {
        if (!sideOpen) {
            document.getElementById("spinner").style.rotate = "-180deg"
            document.getElementById("container").style.left = "calc(100vw - 1.5rem - 14rem)"
        } else {
            
            document.getElementById("spinner").style.rotate = "0deg"
            document.getElementById("container").style.left = "calc(100vw - 1.5rem)"
        }
        sideOpen = !sideOpen
    }
    toggleSide()


</script>
</body>
</html>
